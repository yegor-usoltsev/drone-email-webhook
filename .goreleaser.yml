---
version: 2

project_name: drone-email-webhook

before:
  hooks:
    - go mod tidy

builds:
  - id: drone-email-webhook
    env:
      - CGO_ENABLED=0
    targets:
      - go_first_class
    flags:
      - -trimpath
    ldflags:
      - -s -w

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge "

archives:
  - format_overrides:
      - goos: windows
        formats: zip

checksum:
  name_template: checksums.sha256.txt
  algorithm: sha256

report_sizes: true

dockers_v2:
  - id: drone-email-webhook-image
    dockerfile: Dockerfile
    ids:
      - drone-email-webhook
    images:
      - yusoltsev/drone-email-webhook
      - ghcr.io/yegor-usoltsev/drone-email-webhook
    tags:
      - "v{{ .Version }}"
      - "v{{ .Major }}.{{ .Minor }}"
      - "v{{ .Major }}"
      - "latest"
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: "Webhook that sends email notifications for failed Drone builds"
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.version: "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64

release:
  github:
    owner: yegor-usoltsev
    name: drone-email-webhook
  name_template: "v{{ .Version }}"
  footer: |
    ## Docker images
    - [`yusoltsev/drone-email-webhook:{{ .Version }}`](https://hub.docker.com/r/yusoltsev/drone-email-webhook/tags?name={{ .Version }})
    - [`ghcr.io/yegor-usoltsev/drone-email-webhook:{{ .Version }}`](https://github.com/yegor-usoltsev/drone-email-webhook/pkgs/container/drone-email-webhook)
